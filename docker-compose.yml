services:
  # ─── Main API Server ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: lexai-api
    ports:
      - "3100:3100"
    environment:
      # ── App ──
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      API_VERSION: ${API_VERSION}

      # ── MongoDB (external) ──
      MONGO_URI: mongodb://host.docker.internal:27017/lexai

      # ── Redis ──
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # ── RabbitMQ ──
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      ANALYSIS_QUEUE: ${ANALYSIS_QUEUE}
      ALERT_QUEUE: ${ALERT_QUEUE}
      DLX_EXCHANGE: ${DLX_EXCHANGE}
      NOTIFICATION_QUEUE: ${NOTIFICATION_QUEUE:-lexai.notification.queue}
      ANALYTICS_EVENTS_QUEUE: ${ANALYTICS_EVENTS_QUEUE:-lexai.analytics.queue}
      ORDER_QUEUE: ${ORDER_QUEUE:-lexai.order.queue}
      REVIEW_QUEUE: ${REVIEW_QUEUE:-lexai.review.queue}

      # ── PASETO ──
      PASETO_LOCAL_SECRET: ${PASETO_LOCAL_SECRET}
      PASETO_ACCESS_EXPIRY: ${PASETO_ACCESS_EXPIRY}
      PASETO_REFRESH_EXPIRY: ${PASETO_REFRESH_EXPIRY}
      PASETO_REFRESH_COOKIE_MAX_AGE_MS: ${PASETO_REFRESH_COOKIE_MAX_AGE_MS}

      # ── AI Provider ──
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      AI_PRIMARY_MODEL: ${AI_PRIMARY_MODEL:-llama-3.3-70b-versatile}
      AI_FALLBACK_MODEL: ${AI_FALLBACK_MODEL:-llama-3.1-8b-instant}
      AI_DIFF_MODEL: ${AI_DIFF_MODEL:-llama-3.1-8b-instant}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-60000}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}

      # ── Rate Limiting ──
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}

      # ── File Upload ──
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB}
      ALLOWED_MIME_TYPES: ${ALLOWED_MIME_TYPES}

      # ── CORS ──
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}

      # ── Email ──
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: "${SMTP_SECURE}"
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}

      # ── External APIs ──
      REST_COUNTRIES_URL: ${REST_COUNTRIES_URL}
      WORLD_TIME_API_URL: ${WORLD_TIME_API_URL}

      # ── Redis Token TTLs ──
      EMAIL_VERIFICATION_EXPIRY: ${EMAIL_VERIFICATION_EXPIRY}
      PASSWORD_RESET_EXPIRY: ${PASSWORD_RESET_EXPIRY}
      OTP_EXPIRY: ${OTP_EXPIRY}

      # ── Admin Bootstrap ──
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - lexai-network
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ─── RabbitMQ Worker ──────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: production
    container_name: lexai-worker
    command: node worker.js
    environment:
      # ── App ──
      NODE_ENV: ${NODE_ENV}

      # ── MongoDB (external) ──
      MONGO_URI: mongodb://host.docker.internal:27017/lexai

      # ── Redis ──
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # ── RabbitMQ ──
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      ANALYSIS_QUEUE: ${ANALYSIS_QUEUE}
      ALERT_QUEUE: ${ALERT_QUEUE}
      DLX_EXCHANGE: ${DLX_EXCHANGE}
      NOTIFICATION_QUEUE: ${NOTIFICATION_QUEUE:-lexai.notification.queue}
      ANALYTICS_EVENTS_QUEUE: ${ANALYTICS_EVENTS_QUEUE:-lexai.analytics.queue}
      ORDER_QUEUE: ${ORDER_QUEUE:-lexai.order.queue}
      REVIEW_QUEUE: ${REVIEW_QUEUE:-lexai.review.queue}

      # ── AI Provider ──
      AI_PROVIDER: ${AI_PROVIDER:-groq}
      AI_PRIMARY_MODEL: ${AI_PRIMARY_MODEL:-llama-3.3-70b-versatile}
      AI_FALLBACK_MODEL: ${AI_FALLBACK_MODEL:-llama-3.1-8b-instant}
      AI_DIFF_MODEL: ${AI_DIFF_MODEL:-llama-3.1-8b-instant}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-60000}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}

      # ── PASETO ──
      PASETO_LOCAL_SECRET: ${PASETO_LOCAL_SECRET}
      PASETO_ACCESS_EXPIRY: ${PASETO_ACCESS_EXPIRY}
      PASETO_REFRESH_EXPIRY: ${PASETO_REFRESH_EXPIRY}

      # ── Email ──
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: "${SMTP_SECURE}"
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}

      # ── Redis Token TTLs ──
      EMAIL_VERIFICATION_EXPIRY: ${EMAIL_VERIFICATION_EXPIRY}
      PASSWORD_RESET_EXPIRY: ${PASSWORD_RESET_EXPIRY}
      OTP_EXPIRY: ${OTP_EXPIRY}

    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - lexai-network
    restart: unless-stopped
    stop_grace_period: 30s


  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lexai-redis
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - lexai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ─── RabbitMQ ─────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lexai-rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - lexai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

networks:
  lexai-network:
    driver: bridge

volumes:
  redis_data:
  rabbitmq_data:
