name: LexAI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ─── Security Audit ────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high severity only)
        run: npm audit --audit-level=high

  # ─── Unit Tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: 3100
      API_VERSION: v1
      # MongoDB — use local instance started by service
      MONGO_URI: mongodb://127.0.0.1:27017/lexai_test
      # Redis — use local instance started by service
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      # RabbitMQ — use local instance
      RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672
      ANALYSIS_QUEUE: lexai.analysis.queue
      ALERT_QUEUE: lexai.alert.queue
      DLX_EXCHANGE: lexai.dlx
      # PASETO — use a test secret (never use in production)
      PASETO_LOCAL_SECRET: "ci-test-secret-key-32chars-minimum-length-ok"
      PASETO_ACCESS_EXPIRY: 15m
      PASETO_REFRESH_EXPIRY: 7d
      PASETO_REFRESH_COOKIE_MAX_AGE_MS: 604800000
      # AI — skip real AI in tests
      AI_PROVIDER: openrouter
      OPENROUTER_API_KEY: ""
      GROQ_API_KEY: ""
      AI_PRIMARY_MODEL: "meta-llama/llama-3.1-8b-instruct:free"
      AI_FALLBACK_MODEL: "mistralai/mistral-7b-instruct:free"
      AI_DIFF_MODEL: "mistralai/mistral-7b-instruct:free"
      AI_REQUEST_TIMEOUT_MS: 60000
      # Rate limiting
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 1000
      # File upload
      MAX_FILE_SIZE_MB: 5
      ALLOWED_MIME_TYPES: "application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain"
      # CORS
      ALLOWED_ORIGINS: "http://localhost:3000"
      # Email — disabled in test
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER: "test@example.com"
      SMTP_PASS: "test-password"
      EMAIL_FROM: "test@example.com"
      MAIL_USER: ""
      MAIL_PASS: ""
      # Admin
      ADMIN_EMAIL: "admin@example.com"
      ADMIN_PASSWORD: "TestAdmin@123"
      # TTLs
      PASSWORD_RESET_EXPIRY: 3600
      OTP_EXPIRY: 600
      EMAIL_VERIFICATION_EXPIRY: 600
      # External APIs
      REST_COUNTRIES_URL: "https://restcountries.com/v3.1"
      WORLD_TIME_API_URL: "https://worldtimeapi.org/api"

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─── Build Check ───────────────────────────────────────────────────────────
  build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (API)
        run: docker build -t lexai-api:ci .

      - name: Build Docker image (Worker)
        run: docker build -f Dockerfile.worker -t lexai-worker:ci .
